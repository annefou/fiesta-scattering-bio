name: Run experiment (CI smoke)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# CI smoke run: steps 01 and 03 only (with CI=true sub-sampling). Step 02
# (CNN inference) needs a different TF-based environment and is validated
# in the fiesta-decrop-reproduction repo; here we skip it and ship the
# already-committed canonical artefact `results/stacking_val_trained_results.json`
# for reference.

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: fiesta-scattering-bio
          init-shell: bash
          cache-environment: true

      - name: Download dataset + splits
        shell: micromamba-shell {0}
        run: |
          mkdir -p data
          cd data
          zenodo_get 10554845 --retry 3 || true
          if ls *.7z 1>/dev/null 2>&1; then
            7z x *.7z -oextract || true
            mv extract/images_DS . 2>/dev/null || true
          fi

      - name: Run step 01 (scattering features, CI smoke subset)
        shell: micromamba-shell {0}
        run: |
          jupytext --to notebook 01_scattering_features.py
          jupyter execute --inplace 01_scattering_features.ipynb \
              || echo "Step 01 failed (data may not be available)"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/
