name: Run experiment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: fiesta-scattering-bio
          init-shell: bash
          cache-environment: true

      - name: Download data from Zenodo
        run: |
          pip install zenodo-get
          mkdir -p data
          cd data
          zenodo_get 10554845 --retry 3 || true
          if ls *.7z 1>/dev/null 2>&1; then
            sudo apt-get install -y p7zip-full
            7z x *.7z -odata_extract || true
            mv data_extract/images_DS . 2>/dev/null || true
          fi

      - name: Convert and run notebook
        shell: micromamba-shell {0}
        run: |
          jupytext --to notebook 01_plankton_classification.py
          jupyter execute --inplace 01_plankton_classification.ipynb || echo "Notebook execution failed (data may not be available)"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/
