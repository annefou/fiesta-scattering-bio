name: fiesta-scattering-bio
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.11
  - numpy=2.2
  - matplotlib=3.10
  - scipy=1.15
  - scikit-learn=1.6
  - pandas
  - Pillow=11.2
  - pytorch
  - cpuonly
  - jupytext
  - nbclient
  - ipykernel
  - p7zip
  - pip:
      # CPU-patched fork of FOSCAT (upstream PR: jmdelouis/FOSCAT#40)
      # Use 'foscat' from PyPI instead on a CUDA GPU machine.
      - foscat @ git+https://github.com/annefou/FOSCAT.git@v0.1.0-cpu
      - zenodo-get
