name: fiesta-scattering-bio
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy=2.2
  - matplotlib=3.10
  - scipy=1.15
  - scikit-learn=1.6
  - healpy=1.19
  - jupytext
  - nbclient
  - ipykernel
  - Pillow=11.2
  - pytorch
  - cpuonly
  - pip:
      # CPU-patched fork of FOSCAT (upstream PR: jmdelouis/FOSCAT#40)
      # Use 'foscat' from PyPI instead if running on a CUDA GPU machine
      - foscat @ git+https://github.com/annefou/FOSCAT.git@v0.1.0-cpu
